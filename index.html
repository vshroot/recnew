<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>CSV Reconciler</title>

  <link rel="stylesheet" href="./styles.css?v=5.0.2"/>

  <!-- CSV parser -->
  <script defer src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <!-- Optional: Chart.js (only if your app.js uses it; harmless otherwise) -->
  <script defer src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<!-- App -->
  <script defer src="./app.js?v=5.0.2"></script>
</head>

<body>
  <!-- Top bar -->
  <header class="topbar">
    <div class="brand">
      <div class="brandTitle">CSV Reconciler</div>
      <div class="brandSub muted">Web UI</div>
    </div>

    <div class="topActions">
      <button id="viewsBtn" class="ghost">Views</button>
      <button id="colsBtn" class="ghost">Columns</button>

      <label id="addFileBtn" class="ghost" for="filePicker" role="button" tabindex="0">Add file</label>
      <button id="runBtn" class="primary">Run</button>
    </div>
  </header>

  <!-- Global controls -->
  <section class="toolbar">
    <div class="toolGroup">
      <label class="muted small" for="tolerance">Tolerance</label>
      <input id="tolerance" class="mono" value="0.01" />
      <div class="muted small">abs(base - other) ≤ tolerance</div>
    </div>

    <div class="toolGroup">
      <label class="muted small" for="keepColsGlobal">Keep columns (optional)</label>
      <input id="keepColsGlobal" class="mono" placeholder="colA, colB, colC" />
      <div class="muted small">Extra cols copied into reports</div>
    </div>

    <div class="toolGroup grow">
      <label class="muted small" for="globalTxidSearch">Global txid search</label>
      <div class="row">
        <input id="globalTxidSearch" class="mono grow" placeholder="Search txid across all pairs…" />
        <button id="globalTxidClear" class="ghost">Clear</button>
      </div>
    </div>
  </section>

  <!-- Banner / toasts -->
  <div id="bannerHost" class="bannerHost"></div>

  <!-- Perf bar -->
  <div id="perfBar" class="perfBar" hidden></div>

  <main class="main">
    <!-- Files -->
    <section class="panel">
      <div class="panelHeader">
        <div class="panelTitle">Files</div>
        <div class="muted small">Upload at least 2 CSV files, pick PRIMARY, set columns</div>
      </div>
      <div id="files"></div>
    </section>

    <!-- Progress -->
    <section id="progress" class="panel" hidden>
      <div class="panelHeader">
        <div class="panelTitle">Progress</div>
      </div>
      <div class="progressWrap">
        <div class="progressBarTrack"><div id="progressBar"></div></div>
        <div id="progressText" class="muted small">Working…</div>
      </div>
    </section>

    <!-- Results -->
    <section class="panel">
      <div class="panelHeader">
        <div class="panelTitle">Results</div>
        <div class="muted small">Click a row to open details</div>
      </div>
      <div id="results"></div>
    </section>
  </main>

  <!-- Details side panel (required by app.js) -->
  <aside id="detailsPanel" class="detailsPanel" hidden>
    <div class="detailsHeader">
      <div class="detailsTitle">Details</div>
      <div class="detailsBtns">
        <button id="detailsCopyTxidBtn" class="ghost small">Copy txid</button>
        <button id="detailsCloseBtn" class="ghost small">Close</button>
      </div>
    </div>
    <div id="detailsBody" class="detailsBody"></div>
  </aside>

  <!-- Modal (required by app.js) -->
  <div id="modalBackdrop" class="modalBackdrop" hidden>
    <div id="modal" class="modal" hidden>
      <div class="modalHead">
        <div id="modalTitle" class="modalTitle"></div>
        <button id="modalClose" class="ghost small">✕</button>
      </div>
      <div id="modalBody" class="modalBody"></div>
      <div id="modalFoot" class="modalFoot"></div>
    </div>
  </div>

  <!-- Hidden file picker for reliable "Add file" across browsers -->
  <input id="filePicker" type="file" accept=".csv,text/csv"
    style="position:fixed; left:-9999px; top:-9999px; width:1px; height:1px; opacity:0;" />


  <!-- Hidden global settings required by worker/main logic -->
  <div style="position:fixed; left:-9999px; top:-9999px; width:1px; height:1px; overflow:hidden;">
    <input id="amountScale" value="2" />
    <input id="amountTolerance" value="1" />
    <input id="reportLimit" value="0" />
    <textarea id="statusMappings"></textarea>
  </div>

</body>
</html>
