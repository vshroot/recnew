<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>CSV Reconciler</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <header class="topbar">
    <div class="brand">CSV Reconciler</div>
    <div class="actions">
      <button id="addFileBtn">Add file</button>
      <button id="runBtn" class="primary">Run</button>
    </div>
  </header>

  <main>
    <section id="files"></section>
    <section id="progress" hidden>
      <div class="muted">Processing…</div>
      <div class="progressBar"><div id="progressBar"></div></div>
    </section>
    <section id="results"></section>
  </main>

  <script src="worker.js"></script>
  <script src="app.js"></script>
</body>
</html>
